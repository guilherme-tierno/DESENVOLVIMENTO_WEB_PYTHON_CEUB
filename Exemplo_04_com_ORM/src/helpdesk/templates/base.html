<!doctype html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}HelpDesk{% endblock %}</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, Arial, sans-serif;
            background: #f3f4f6;
            color: #1f2937;
        }

        .topbar {
            background: #ffffff;
            border-bottom: 1px solid #e5e7eb;
            box-shadow: 0 1px 2px rgba(0,0,0,0.03);
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            min-height: 64px;
        }

        .brand {
            font-size: 1.4rem;
            font-weight: 700;
            color: #111827;
            text-decoration: none;
        }

        .menu {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .menu > a,
        .dropbtn {
            text-decoration: none;
            color: #374151;
            font-size: 0.98rem;
            font-weight: 500;
            padding: 10px 14px;
            border-radius: 8px;
            transition: background 0.2s ease, color 0.2s ease;
            background: transparent;
            border: none;
            cursor: pointer;
        }

        .menu > a:hover,
        .dropbtn:hover {
            background: #f3f4f6;
            color: #111827;
        }

        .dropdown {
            position: relative;
        }
        .dropdown::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%;
            height: 10px;
        }
        .dropdown-content {
            display: none;
            position: absolute;
            top: 100%;
            margin-top: 6px; /* opcional, mas seguro */
            left: 0;
            min-width: 180px;
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            padding: 8px 0;
            z-index: 1000;
        }

        .dropdown-content a {
            display: block;
            padding: 10px 14px;
            text-decoration: none;
            color: #374151;
            font-size: 0.95rem;
            transition: background 0.2s ease;
        }

        .dropdown-content a:hover {
            background: #f9fafb;
            color: #111827;
        }

        .dropdown:hover .dropdown-content {
            display: block;
        }

        main.container {
            padding-top: 28px;
            padding-bottom: 40px;
        }

        .card {
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 14px;
            padding: 32px;
            box-shadow: 0 4px 18px rgba(0,0,0,0.04);
        }

        h1, h2, h3 {
            margin-top: 0;
            color: #111827;
        }

        p {
            color: #4b5563;
            line-height: 1.6;
        }

        .btn {
            display: inline-block;
            padding: 10px 16px;
            border-radius: 8px;
            text-decoration: none;
            border: 1px solid #d1d5db;
            background: #ffffff;
            color: #111827;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .btn:hover {
            background: #f9fafb;
            border-color: #9ca3af;
        }

        .muted {
            color: #6b7280;
        }

        ul.clean {
            padding-left: 18px;
        }

        @media (max-width: 768px) {
            .nav {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
                padding: 12px 0;
            }

            .menu {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <header class="topbar">
        <div class="container nav">
            <a href="{{ url_for('pages.home') }}" class="brand">HelpDesk</a>

            <nav class="menu">
                <a href="{{ url_for('pages.home') }}">Home</a>

                <div class="dropdown">
                    <button class="dropbtn">Tickets ▾</button>
                    <div class="dropdown-content">
                        <a href="{{ url_for('tickets.lista') }}">Listar tickets</a>
                        <a href="{{ url_for('tickets.criar_ticket') }}">Criar ticket</a>
                    </div>
                </div>

                <div class="dropdown">
                    <button class="dropbtn">Users ▾</button>
                    <div class="dropdown-content">
                        <a href="{{ url_for('users.lista') }}">Listar usuários</a>
                        <a href="{{ url_for('users.criar_usuario') }}">Criar usuário</a>
                    </div>
                </div>

                <a href="{{ url_for('pages.sobre') }}">Sobre</a>
            </nav>
        </div>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
