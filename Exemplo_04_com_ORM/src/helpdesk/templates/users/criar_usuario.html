<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Usuário criado</title>
</head>
<body>
    <h1>Usuário criado com sucesso</h1>

    <p><strong>ID:</strong> {{ user.id }}</p>
    <p><strong>Nome:</strong> {{ user.name }}</p>
    <p><strong>E-mail:</strong> {{ user.email }}</p>
    <p><strong>Perfil:</strong> {{ user.role }}</p>

    <a href="{{ url_for('pages.home') }}">Voltar</a>
</body>
</html>
