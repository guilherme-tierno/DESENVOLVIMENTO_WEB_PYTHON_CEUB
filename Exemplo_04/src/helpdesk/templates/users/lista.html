{% extends "base.html" %}
{% block title %}Users{% endblock %}

{% block content %}
  <h1>Users</h1>

  <table class="table">
    <thead>
      <tr>
        <th>ID</th><th>Nome</th><th>Email</th><th>Role</th>
      </tr>
    </thead>
    <tbody>
      {% for u in users %}
      <tr>
        <td>{{ u.id }}</td>
        <td>{{ u.name }}</td>
        <td>{{ u.email }}</td>
        <td>{{ u.role }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
{% endblock %}
